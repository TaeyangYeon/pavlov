version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: pavlov_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pavlov}
      POSTGRES_USER: ${POSTGRES_USER:-pavlov_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pavlov_user} -d ${POSTGRES_DB:-pavlov}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pavlov_network

  postgres_test:
    image: postgres:15
    container_name: pavlov_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_TEST_DB:-pavlov_test}
      POSTGRES_USER: ${POSTGRES_USER:-pavlov_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pavlov_user} -d ${POSTGRES_TEST_DB:-pavlov_test}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pavlov_network

volumes:
  postgres_data:
    driver: local
  postgres_test_data:
    driver: local

networks:
  pavlov_network:
    driver: bridge